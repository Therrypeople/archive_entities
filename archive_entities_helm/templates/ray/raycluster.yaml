apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-sample
spec:
  rayVersion: '2.9.0'
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      spec:
        containers:
          - name: ray-head
            image: {{.Values.ray.image}}
            resources:
              limits: {cpu: "1", memory: "2Gi"}
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 1
    groupName: default-group
    rayStartParams: {}
    template:
      spec:
        containers:
          - name: ray-worker
            image: {{.Values.ray.image}}
            resources:
              limits: {cpu: "1", memory: "2Gi"}
