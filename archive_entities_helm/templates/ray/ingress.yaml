apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neodash
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: raycluster-head-svc
            port:
              number: 8265