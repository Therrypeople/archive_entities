ray:
  name: raycluster
  image: ghcr.io/therrypeople/archive_entities/ray:latest

streamlit:
  image: ghcr.io/therrypeople/archive_entities/streamlit:latest
  port: 8501


neo4j:
  neo4j:
    # Mandatory: The internal name for the Neo4j instance
    name: "parish-records-kg"
    # Select edition: "community" (default) or "enterprise"
    edition: "community"
  volumes:
    data:
      mode: defaultStorageClass


neodash:
  neo4j:
    url: "neo4j://my-neo4j-service:7687"